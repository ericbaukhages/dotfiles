format = "$all"

[hostname]
ssh_only = true
disabled = false

[git_branch]
format = " [$symbol$branch]($style) "
style = "bold purple"

[git_status]
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"
style = "bold red"

[nodejs]
format = " [$symbol$version]($style) "

[rust]
format = " [$symbol$version]($style) "

[golang]
format = " [$symbol$version]($style) "

[cmd_duration]
show_milliseconds = true
